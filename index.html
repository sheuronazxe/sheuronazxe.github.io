    <meta name="description" content="Futura Cybercafe — In Memoriam (1998–2018). Homenaje al legendario cibercafé de Lugo.">

</head>
<body>
    <noscript>
        <div class="no-js-message">Esta página requiere JavaScript para mostrar la experiencia completa.</div>
    </noscript>

    <svg xmlns="http://www.w3.org/2000/svg" class="svg-defs">

    <div id="power-screen">
        <button class="power-btn" id="power-btn" type="button" aria-label="Encender">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <line x1="12" y1="2" x2="12" y2="12"></line>
                <path d="M16.24 7.76a6 6 0 0 1-8.49 8.49 6 6 0 0 1 0-8.49"></path>
            </svg>
        </button>
        <div class="power-label">Pulsa para encender</div>
    </div>

    <div id="crt-overlay">
        <canvas id="crt-canvas"></canvas>
    </div>

    <main id="main-page">
        <div id="polaroid-layer"></div>
        <div class="beam"></div>
        <div class="bloom"></div>

        <header class="logo-container">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="svg-wrapper">
                <svg class="svg-layer svg-glow-outer" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-layer svg-glow-inner" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-layer svg-glitch-a" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-layer svg-glitch-b" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-layer svg-glitch-c" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-main" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <svg class="svg-layer svg-draw" viewBox="0 0 873 135" aria-hidden="true"><use href="#futura-path"/></svg>
                <div class="write-head"></div>
                <div class="noise-bar noise-bar--1"></div>
                <div class="noise-bar noise-bar--2"></div>
                <div class="noise-bar noise-bar--3"></div>
            </div>

            <p class="years">1998 ~ 2018</p>
            <div class="divider"></div>
            <p class="memo">in memoriam</p>
        </header>
    </main>

    <button class="audio-toggle" id="audio-toggle" type="button" aria-label="Activar o desactivar audio" aria-pressed="false">
        <svg class="vol-on" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06a6.51 6.51 0 0 1 0 13.42v2.06A8.5 8.5 0 0 0 14 3.23z"/>
        </svg>
        <svg class="vol-off" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5z"/>
            <line x1="23" y1="1" x2="1" y2="23" stroke="currentColor" stroke-width="2"/>
        </svg>
    </button>

    <script src="static/script.js" defer></script>
</body>
</html>
